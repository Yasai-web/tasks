<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルーティン管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dbd4;
  --text: #1a1814;
  --text2: #6b6560;
  --text3: #a09890;
  --accent: #3d6b5e;
  --accent-light: #e8f0ee;
  --accent-mid: #5c9586;
  --danger: #c0392b;
  --danger-bg: #fdf0ee;
  --done: #3d6b5e;
  --undone: #c5bfb8;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 60px;
}

.app {
  max-width: 420px;
  margin: 0 auto;
}

/* ヘッダー */
.header {
  text-align: center;
  margin-bottom: 28px;
}

.header-date {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

/* 進捗リング */
.progress-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin-bottom: 20px;
}

.ring-container {
  position: relative;
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}

.ring-container svg {
  transform: rotate(-90deg);
}

.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
.ring-fg {
  fill: none;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1);
}

.ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--accent);
}

.progress-info {
  flex: 1;
}

.progress-title {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 4px;
}

.progress-count {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}

.progress-count span {
  font-size: 14px;
  font-weight: 400;
  color: var(--text3);
}

.progress-msg {
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
  min-height: 16px;
  transition: opacity 0.3s;
}

/* タブ */
.tabs {
  display: flex;
  background: var(--surface2);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 16px;
  gap: 3px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  color: var(--text2);
  user-select: none;
}

.tab.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* タスクリスト */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.task {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.task:active { transform: scale(0.99); }

.task.checked {
  background: var(--accent-light);
  border-color: #b8d4ce;
}

.checkbox {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}

.task.checked .checkbox {
  background: var(--accent);
  border-color: var(--accent);
}

.check-icon {
  width: 12px;
  height: 12px;
  opacity: 0;
  transition: opacity 0.15s;
}

.task.checked .check-icon { opacity: 1; }

.task-name {
  font-size: 15px;
  color: var(--text);
  transition: color 0.2s;
}

.task.checked .task-name {
  color: var(--accent);
}

/* ボタン群 */
.actions {
  margin-top: 8px;
}

.btn {
  padding: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.btn-primary:hover { background: #2e5448; }

.btn-secondary {
  background: var(--surface);
  color: var(--text2);
}

.btn-secondary:hover { background: var(--surface2); }

/* 履歴 */
.history-section {
  margin-top: 20px;
}

.history-section h3 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.history-date {
  font-size: 13px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

.history-rate {
  font-size: 13px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}

.rate-full { background: var(--accent-light); color: var(--accent); }
.rate-mid { background: #fef9e7; color: #9a6e0a; }
.rate-low { background: var(--danger-bg); color: var(--danger); }

.history-tasks {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.history-task {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.history-task .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.history-task.done .dot { background: var(--done); }
.history-task.notdone .dot { background: var(--undone); }
.history-task.done { color: var(--text2); }
.history-task.notdone { color: var(--text3); }

.history-empty {
  text-align: center;
  padding: 32px;
  color: var(--text3);
  font-size: 14px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-date" id="headerDate"></div>
    <h1>ルーティン管理</h1>
  </div>

  <!-- 進捗リング -->
  <div class="progress-wrap">
    <div class="ring-container">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="30"/>
        <circle class="ring-fg" id="ringFg" cx="36" cy="36" r="30"
          stroke-dasharray="188.5"
          stroke-dashoffset="188.5"/>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
    </div>
    <div class="progress-info">
      <div class="progress-title">今日の達成</div>
      <div class="progress-count" id="progressCount">0 <span>/ 0 タスク</span></div>
      <div class="progress-msg" id="progressMsg"></div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab active" data-tab="daily" onclick="switchTab('daily', event)">毎日</div>
    <div class="tab" data-tab="monthly" onclick="switchTab('monthly', event)">毎月</div>
  </div>

  <!-- タスクリスト -->
  <div class="task-list" id="taskList"></div>

  <!-- アクションボタン -->
  <div class="actions">
    <button class="btn btn-primary" onclick="toggleHistory()">履歴を見る</button>
  </div>

  <!-- 履歴 -->
  <div class="history-section" id="historySection" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- データ ----
let current = "daily";
let historyVisible = false;

const taskDefs = {
  daily: ["水を飲む", "運動", "日記"],
  monthly: ["振り返り", "家計簿"]
};

// ---- localStorage ラッパー ----
function lsGet(key) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch { return null; }
}

function lsSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch { return false; }
}

function lsRemove(key) {
  try { localStorage.removeItem(key); } catch {}
}

// ---- 日付ユーティリティ ----
function today() {
  return new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"2-digit", day:"2-digit" });
}

function nowStr() {
  return new Date().toLocaleString("ja-JP", {
    year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit"
  });
}

// ---- 日次自動リセット検知 ----
function checkDailyReset() {
  const savedDate = lsGet("daily_last_reset_date");
  const currentDate = new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"2-digit", day:"2-digit" });
  if (savedDate && savedDate !== currentDate) {
    const saved = lsGet("daily") || {};
    const history = lsGet("daily_history") || [];
    history.push({ date: nowStr(), data: buildHistoryData("daily", saved) });
    lsSet("daily_history", history);
    lsRemove("daily");
  }
  lsSet("daily_last_reset_date", currentDate);
}

// ---- 月次自動リセット検知 ----
function checkMonthlyReset() {
  const savedMonth = lsGet("monthly_last_reset_month");
  const currentMonth = new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"2-digit" });
  if (savedMonth && savedMonth !== currentMonth) {
    const saved = lsGet("monthly") || {};
    const history = lsGet("monthly_history") || [];
    history.push({ date: nowStr(), data: buildHistoryData("monthly", saved) });
    lsSet("monthly_history", history);
    lsRemove("monthly");
  }
  lsSet("monthly_last_reset_month", currentMonth);
}

// ---- タスクデータ（名前キー） ----
function getTaskStates(type) {
  return lsGet(type) || {};
}

function setTaskState(type, taskName, checked) {
  const states = getTaskStates(type);
  states[taskName] = checked;
  lsSet(type, states);
}

// ---- 履歴用データ生成（タスク名を保存） ----
function buildHistoryData(type, states) {
  const result = {};
  taskDefs[type].forEach(name => {
    result[name] = states[name] || false;
  });
  return result;
}

// ---- 描画 ----
function render() {
  const states = getTaskStates(current);
  const tasks = taskDefs[current];
  const container = document.getElementById("taskList");
  container.innerHTML = "";

  tasks.forEach(name => {
    const checked = states[name] || false;
    const div = document.createElement("div");
    div.className = "task" + (checked ? " checked" : "");
    div.onclick = () => toggleTask(name);
    div.innerHTML = `
      <div class="checkbox">
        <svg class="check-icon" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="task-name">${name}</span>
    `;
    container.appendChild(div);
  });

  updateProgress();
  if (historyVisible) renderHistory();
}

function toggleTask(name) {
  const states = getTaskStates(current);
  const newVal = !(states[name] || false);
  setTaskState(current, name, newVal);
  render();
}

function updateProgress() {
  const states = getTaskStates(current);
  const tasks = taskDefs[current];
  const done = tasks.filter(n => states[n]).length;
  const total = tasks.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const circumference = 188.5;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById("ringFg").style.strokeDashoffset = offset;
  document.getElementById("ringLabel").textContent = pct + "%";
  document.getElementById("progressCount").innerHTML =
    `${done} <span>/ ${total} タスク</span>`;

  const msgs = ["さあ始めましょう！", "いい調子です", "もう少し！", "完璧です！"];
  const msgEl = document.getElementById("progressMsg");
  if (done === 0) msgEl.textContent = "";
  else if (pct === 100) msgEl.textContent = msgs[3];
  else if (pct >= 66) msgEl.textContent = msgs[2];
  else msgEl.textContent = msgs[1];
}

// ---- タブ切替 ----
function switchTab(type, e) {
  current = type;
  historyVisible = false;
  document.getElementById("historySection").style.display = "none";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  e.currentTarget.classList.add("active");

  // 月次タブ時は progress タイトルを変更
  const title = document.querySelector(".progress-title");
  title.textContent = type === "daily" ? "今日の達成" : "今月の達成";

  render();
}

// ---- 履歴 ----
function toggleHistory() {
  historyVisible = !historyVisible;
  const section = document.getElementById("historySection");
  if (historyVisible) {
    section.style.display = "block";
    renderHistory();
  } else {
    section.style.display = "none";
  }
}

function renderHistory() {
  const history = lsGet(current + "_history") || [];
  const section = document.getElementById("historySection");

  if (history.length === 0) {
    section.innerHTML = `
      <h3>履歴</h3>
      <div class="history-empty">まだ履歴がありません</div>
    `;
    return;
  }

  let html = "<h3>履歴</h3>";
  history.slice().reverse().forEach(h => {
    const taskList = Object.keys(h.data);
    const total = taskList.length;
    const done = taskList.filter(k => h.data[k]).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const rateClass = pct === 100 ? "rate-full" : pct >= 50 ? "rate-mid" : "rate-low";

    const taskRows = taskList.map(name => {
      const isDone = h.data[name];
      return `<div class="history-task ${isDone ? "done" : "notdone"}">
        <span class="dot"></span>${name}
      </div>`;
    }).join("");

    html += `
      <div class="history-card">
        <div class="history-header">
          <span class="history-date">${h.date}</span>
          <span class="history-rate ${rateClass}">${pct}%</span>
        </div>
        <div class="history-tasks">${taskRows}</div>
      </div>
    `;
  });

  section.innerHTML = html;
}

// ---- Toast ----
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

// ---- 日付表示 ----
function setDate() {
  const d = new Date();
  const str = d.toLocaleDateString("ja-JP", {
    year: "numeric", month: "long", day: "numeric", weekday: "short"
  });
  document.getElementById("headerDate").textContent = str;
}

// ---- 起動 ----
checkDailyReset();
checkMonthlyReset();
setDate();
render();
</script>
</body>
</html>
