
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app {
    font-family: 'Noto Sans JP', var(--font-sans), sans-serif;
    max-width: 420px;
    margin: 0 auto;
    padding: 1rem 0;
  }
  h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 12px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 8px 14px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-icon { width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  #datePicker { position: absolute; opacity: 0; pointer-events: none; }
  .progress {
    font-size: 15px;
    color: var(--color-text-secondary);
    margin-bottom: 12px;
  }
  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    font-size: 14px;
    color: var(--color-text-primary);
  }
  .task.state-done { background: var(--color-background-success); border-color: var(--color-border-success); }
  .task.state-multi { background: var(--color-background-info); border-color: var(--color-border-info); }
  .task.state-skip { background: var(--color-background-secondary); opacity: 0.55; }
  .checkbox {
    width: 22px;
    min-width: 22px;
    text-align: center;
    font-weight: 500;
    font-size: 15px;
    color: var(--color-text-secondary);
  }
  .state-done .checkbox { color: var(--color-text-success); }
  .state-multi .checkbox { color: var(--color-text-info); }
</style>

<div class="app">
  <h2 id="date"></h2>
  <div class="controls">
    <button class="btn" onclick="goToday()">今日</button>
    <button class="btn btn-icon" onclick="openCalendar()">📅</button>
    <input type="date" id="datePicker" onchange="onDateChange(this.value)">
  </div>
  <div class="progress" id="progress"></div>
  <div id="taskList"></div>
</div>

<script>
const TASKS = ["日記を書く","太陽を浴びる（散歩）","うんちする（息子とトイレ）","朝ごはんを多めに食べる","サプリを飲む（クレアチン）","どこか1ヶ所掃除（トイレ掃除）","何か生産的なことをする","早めに寝る"];

function getAdjustedDate() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);
  return now;
}

function dateToKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}/${m}/${day}`;
}

function keyToDate(key) {
  const [y, m, d] = key.split("/").map(Number);
  return new Date(y, m - 1, d);
}

function keyToPickerValue(key) {
  const [y, m, d] = key.split("/");
  return `${y}-${m}-${d}`;
}

function getTodayKey() {
  return dateToKey(getAdjustedDate());
}

let editingDateKey = getTodayKey();

function getState() {
  try {
    const all = JSON.parse(localStorage.getItem("tasksByDate") || "{}");
    return all[editingDateKey] || {};
  } catch {
    return {};
  }
}

function setState(data) {
  try {
    const all = JSON.parse(localStorage.getItem("tasksByDate") || "{}");
    all[editingDateKey] = data;
    localStorage.setItem("tasksByDate", JSON.stringify(all));
  } catch {
  }
}

function cycleTask(name) {
  const state = getState();
  const s = state[name] ?? 0;
  state[name] = s === 3 ? 0 : (s + 1) % 3;
  setState(state);
  render();
}

function setSkip(name) {
  const state = getState();
  state[name] = 3;
  setState(state);
  render();
}

function addLongPress(el, name) {
  let timer;
  let didLongPress = false;

  function start() {
    didLongPress = false;
    timer = setTimeout(() => {
      didLongPress = true;
      setSkip(name);
    }, 500);
  }
  function cancel() { clearTimeout(timer); }

  el.addEventListener("touchstart", start, { passive: true });
  el.addEventListener("touchend", cancel);
  el.addEventListener("touchmove", cancel);
  el.addEventListener("mousedown", start);
  el.addEventListener("mouseup", cancel);
  el.addEventListener("mouseleave", cancel);
  el.addEventListener("click", () => { if (!didLongPress) cycleTask(name); });
}

function render() {
  updateMaxDate();
  const state = getState();
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  TASKS.forEach(name => {
    const s = state[name] ?? 0;
    const div = document.createElement("div");
    div.className = "task" + (s === 1 ? " state-done" : s === 2 ? " state-multi" : s === 3 ? " state-skip" : "");

    const label = s === 1 ? "✓" : s === 2 ? "◎" : s === 3 ? "−" : "";
    div.innerHTML = `<div class="checkbox">${label}</div><div>${name}</div>`;
    addLongPress(div, name);
    list.appendChild(div);
  });

  updateProgress(state);
  updateDateDisplay();
}

function updateProgress(state) {
  let done = 0, target = 0;
  TASKS.forEach(name => {
    const s = state[name] ?? 0;
    if (s !== 3) {
      target++;
      if (s === 1 || s === 2) done++;
    }
  });
  const pct = target ? Math.round(done / target * 100) : 0;
  document.getElementById("progress").textContent = `${done} / ${target} (${pct}%)`;
}

function updateDateDisplay() {
  const d = keyToDate(editingDateKey);
  document.getElementById("date").textContent = d.toLocaleDateString("ja-JP", {
    year: "numeric", month: "long", day: "numeric", weekday: "short"
  });
}

function updateMaxDate() {
  document.getElementById("datePicker").max = keyToPickerValue(getTodayKey());
}

function syncPicker() {
  document.getElementById("datePicker").value = keyToPickerValue(editingDateKey);
}

function openCalendar() {
  document.getElementById("datePicker").showPicker();
}

function onDateChange(val) {
  if (!val) return;
  const [y, m, d] = val.split("-");
  editingDateKey = `${y}/${m}/${d}`;
  render();
}

function goToday() {
  editingDateKey = getTodayKey();
  syncPicker();
  render();
}

syncPicker();
render();
</script>
