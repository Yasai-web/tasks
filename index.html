<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルーティン管理</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f5f4f0;
  padding: 20px;
}

.app { max-width: 420px; margin: 0 auto; }

h2 { margin-bottom: 10px; }

.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: white;
}

.icon-btn {
  width: 42px;
  height: 42px;
  font-size: 20px;
}

#datePicker {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.task {
  display: flex;
  gap: 10px;
  padding: 14px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  margin-bottom: 8px;
}

.task.state-done { background: #e8f0ee; }
.task.state-multi { background: #e6f0ff; }
.task.state-skip { background: #f3f3f3; opacity: 0.6; }

.checkbox {
  width: 24px;
  text-align: center;
  font-weight: bold;
}

.progress {
  margin: 10px 0;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="app">

  <h2 id="date"></h2>

  <div class="controls">
    <button onclick="goToday()">今日</button>
    <button onclick="openCalendar()" class="icon-btn">📅</button>
    <input type="date" id="datePicker" onchange="onDateChange(this.value)">
  </div>

  <div class="progress" id="progress"></div>

  <div id="taskList"></div>

</div>

<script>
// ===== タスク =====
const tasks = ["日記を書く", "太陽を浴びる（散歩）", "うんちする（息子とトイレ）", "朝ごはんを多めに食べる", "サプリを飲む（クレアチン）", "どこか1ヶ所掃除（トイレ掃除）", "何か生産的なことをする", "早めに寝る"];

// ===== 4時基準の日付 =====
function getDayKey() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);

  return now.toLocaleDateString("ja-JP", {
    year:"numeric", month:"2-digit", day:"2-digit"
  });
}

// ===== 状態管理 =====
let editingDateKey = getDayKey();

function getState() {
  const all = JSON.parse(localStorage.getItem("tasksByDate") || "{}");
  return all[editingDateKey] || {};
}

function setState(data) {
  const all = JSON.parse(localStorage.getItem("tasksByDate") || "{}");
  all[editingDateKey] = data;
  localStorage.setItem("tasksByDate", JSON.stringify(all));
}

// ===== トグル =====
function toggleTask(name) {
  const state = getState();
  const s = state[name] ?? 0;

  let next;
  if (s === 3) next = 0;
  else next = (s + 1) % 3;

  state[name] = next;
  setState(state);
  render();
}

function setSkip(name) {
  const state = getState();
  state[name] = 3;
  setState(state);
  render();
}

// ===== 長押し =====
function addLongPress(el, name) {
  let timer;
  let longPress = false;

  const start = () => {
    longPress = false;
    timer = setTimeout(() => {
      longPress = true;
      setSkip(name);
    }, 500);
  };

  const cancel = () => clearTimeout(timer);

  el.addEventListener("touchstart", start);
  el.addEventListener("touchend", cancel);
  el.addEventListener("touchmove", cancel);

  el.addEventListener("mousedown", start);
  el.addEventListener("mouseup", cancel);
  el.addEventListener("mouseleave", cancel);

  el.addEventListener("click", () => {
    if (!longPress) toggleTask(name);
  });
}

// ===== 描画 =====
function render() {
  const state = getState();
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach(name => {
    const s = state[name] ?? 0;

    const div = document.createElement("div");
    div.className = "task";

    if (s === 1) div.classList.add("state-done");
    if (s === 2) div.classList.add("state-multi");
    if (s === 3) div.classList.add("state-skip");

    let label = "";
    if (s === 1) label = "✓";
    if (s === 2) label = "◎";
    if (s === 3) label = "−";

    div.innerHTML = `
      <div class="checkbox">${label}</div>
      <div>${name}</div>
    `;

    addLongPress(div, name);
    list.appendChild(div);
  });

  updateProgress();
  updateDateDisplay();
}

// ===== 進捗 =====
function updateProgress() {
  const state = getState();

  let done = 0;
  let target = 0;

  tasks.forEach(name => {
    const s = state[name] ?? 0;

    if (s !== 3) {
      target++;
      if (s === 1 || s === 2) done++;
    }
  });

  const pct = target ? Math.round(done / target * 100) : 0;

  document.getElementById("progress").textContent =
    `${done} / ${target} (${pct}%)`;
}

// ===== 日付表示 =====
function formatDate(key) {
  const d = new Date(key);
  return d.toLocaleDateString("ja-JP", {
    year:"numeric", month:"long", day:"numeric", weekday:"short"
  });
}

function updateDateDisplay() {
  document.getElementById("date").textContent = formatDate(editingDateKey);
}

// ===== カレンダー操作 =====
function openCalendar() {
  const picker = document.getElementById("datePicker");
  picker.showPicker();
}

function onDateChange(val) {
  if (!val) return;

  const d = new Date(val);
  editingDateKey = d.toLocaleDateString("ja-JP", {
    year:"numeric", month:"2-digit", day:"2-digit"
  });

  render();
}

function goToday() {
  editingDateKey = getDayKey();
  syncPicker();
  render();
}

// ===== カレンダー制御 =====
function syncPicker() {
  const d = new Date(editingDateKey);
  document.getElementById("datePicker").value =
    d.toISOString().split("T")[0];
}

function setMaxDate() {
  const d = new Date(getDayKey());
  document.getElementById("datePicker").max =
    d.toISOString().split("T")[0];
}

// ===== 起動 =====
setMaxDate();
syncPicker();
render();

</script>

</body>
</html>
