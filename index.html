<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルーティン管理</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 16px;
  max-width: 500px;
  margin: auto;
  background: #f0f2f5;
}

h2 {
  text-align: center;
}

/* タブ */
.tabs {
  display: flex;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: #ddd;
  cursor: pointer;
  border-radius: 10px 10px 0 0;
}

.tab.active {
  background: #4CAF50;
  color: white;
}

/* タスク */
.task {
  display: flex;
  align-items: center;
  padding: 14px;
  margin: 8px 0;
  background: white;
  border-radius: 10px;
  font-size: 16px;
}

input[type="checkbox"] {
  transform: scale(1.5);
  margin-right: 12px;
}

/* ボタン */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
}

/* 履歴 */
#history {
  margin-top: 20px;
}

.history-card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-top: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.rate {
  font-weight: bold;
  margin-bottom: 6px;
  color: #4CAF50;
}

.done {
  color: #4CAF50;
}

.notdone {
  color: #999;
}
</style>
</head>

<body>

<h2>ルーティン管理</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('daily', event)">今日</div>
  <div class="tab" onclick="switchTab('monthly', event)">今月</div>
</div>

<div id="tasks"></div>

<button onclick="resetTasks()">リセット</button>
<button onclick="showHistory()">履歴を見る</button>

<div id="history"></div>

<script>
let current = "daily";

const tasks = {
  daily: ["水を飲む", "運動", "日記"],
  monthly: ["振り返り", "家計簿"]
};

// タブ切替
function switchTab(type, e) {
  current = type;

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active");
  });

  e.target.classList.add("active");

  document.getElementById("history").innerHTML = "";
  render();
}

// 描画
function render() {
  const container = document.getElementById("tasks");
  const saved = JSON.parse(localStorage.getItem(current)) || {};

  container.innerHTML = "";

  tasks[current].forEach((task, i) => {
    const div = document.createElement("div");
    div.className = "task";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = saved[i] || false;

    checkbox.onchange = () => {
      saved[i] = checkbox.checked;
      localStorage.setItem(current, JSON.stringify(saved));
    };

    div.appendChild(checkbox);
    div.appendChild(document.createTextNode(task));
    container.appendChild(div);
  });
}

// リセット＋履歴保存
function resetTasks() {
  const saved = JSON.parse(localStorage.getItem(current)) || {};
  const history = JSON.parse(localStorage.getItem(current + "_history")) || [];

  history.push({
    date: new Date().toLocaleString(),
    data: saved
  });

  localStorage.setItem(current + "_history", JSON.stringify(history));
  localStorage.removeItem(current);

  document.getElementById("history").innerHTML = "";
  render();
}

// 履歴表示（改善版）
function showHistory() {
  const history = JSON.parse(localStorage.getItem(current + "_history")) || [];
  const container = document.getElementById("history");

  container.innerHTML = "<h3>履歴</h3>";

  history.slice().reverse().forEach(h => {
    const div = document.createElement("div");
    div.className = "history-card";

    const taskList = tasks[current];
    let completed = 0;

    let html = `<div><strong>${h.date}</strong></div>`;

    taskList.forEach((task, i) => {
      const done = h.data[i] || false;
      if (done) completed++;

      html += `<div class="${done ? "done" : "notdone"}">
        ${done ? "✔" : "✖"} ${task}
      </div>`;
    });

    const rate = Math.round((completed / taskList.length) * 100);

    html = `<div class="rate">達成率：${rate}%</div>` + html;

    div.innerHTML = html;
    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
